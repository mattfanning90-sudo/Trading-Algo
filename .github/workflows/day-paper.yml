name: Day Trading Paper (hourly)

# Advances ONLY the day-trading book (daytrader: $10k, intraday profile, 60m
# bars) once an hour on weekdays, commits its state, and republishes the
# dashboards so the site tracks the book through the day.
#
# Honest scope: this is hourly-cadence paper trading on Yahoo 60m data, which is
# ~15 minutes delayed — a realistic paper exercise, NOT a live-feed simulation.
# The heavyweight daily fx-paper workflow (ML retrain, all books) is unchanged.
# NOTE: schedule: only fires on the DEFAULT branch.

on:
  schedule:
    - cron: "7 * * * 1-5"    # hourly on weekdays, off the :00 spike
  workflow_dispatch: {}

permissions:
  contents: write      # commit updated paper state
  pages: write         # republish the dashboard
  id-token: write      # required by deploy-pages

concurrency:
  group: day-paper
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FX_STATE_DIR: ${{ github.workspace }}/state
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Advance the day-trading book (hourly bar)
        run: |
          mkdir -p state public
          python -m trading_algo.forex.paper --init          # creates daytrader if new
          python -m trading_algo.forex.engine --once --account daytrader

      - name: Export dashboards
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MOMENTUM_STATE_DIR: ${{ github.workspace }}/state
        run: |
          python -m trading_algo.forex.dashboard --all --out-dir public || true
          # Equity-momentum books too — this deploy replaces the whole site, so
          # they must be re-exported or their pages would vanish until 23:00 UTC.
          for f in state/paper_state_*.json; do
            [ -e "$f" ] || continue
            name=$(basename "$f" .json); name=${name#paper_state_}
            python -m trading_algo.dashboard.export --account "$name" \
              -o "public/eq_${name}.html" || echo "skip equity $name"
          done

      - name: Build combined landing page
        run: |
          {
            echo '<!doctype html><meta charset=utf-8><title>Trading Paper Books</title>'
            echo '<meta name=viewport content="width=device-width,initial-scale=1">'
            echo '<style>body{font-family:system-ui,sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:3rem;max-width:760px}'
            echo 'h1{margin:0 0 .25rem}h2{margin:2rem 0 .5rem;font-size:1rem;color:#8b949e}.s{color:#8b949e;margin:0 0 1rem}'
            echo 'a.card{display:block;margin:.8rem 0;padding:1.1rem 1.4rem;border:1px solid #30363d;border-radius:14px;background:#161b22;color:#e6edf3;text-decoration:none}'
            echo 'a.card:hover{border-color:#58a6ff}.n{font-size:1.15rem;font-weight:600;color:#58a6ff}.d{color:#8b949e;font-size:.85rem}</style>'
            echo "<h1>Trading Paper Books</h1><p class=s>updated $(date -u '+%Y-%m-%d %H:%M UTC')</p>"
            echo '<a class=card href="how.html" style="border-color:#1f6feb"><div class=n>📖 How it works — start here</div><div class=d>a plain-English flow diagram of what the system does and why</div></a>'
            echo '<h2>FX & crypto — candlesticks + the reasoning behind every trade</h2>'
            for f in public/fx_*.html; do [ -e "$f" ] || continue; b=$(basename "$f" .html); n=${b#fx_}
              echo "<a class=card href=\"$b.html\"><div class=n>$n</div><div class=d>paper book</div></a>"; done
            echo '<h2>Equity momentum (FTSE / US / ASX)</h2>'
            for f in public/eq_*.html; do [ -e "$f" ] || continue; b=$(basename "$f" .html); n=${b#eq_}
              echo "<a class=card href=\"$b.html\"><div class=n>$n</div><div class=d>equity momentum book</div></a>"; done
          } > public/index.html

      - name: Commit updated paper state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A state/
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "chore: update day-trading state [skip ci]"
            # tolerate races with the daily fx-paper workflow
            git pull --rebase origin ${{ github.ref_name }} || true
            git push || (sleep 5 && git pull --rebase origin ${{ github.ref_name }} && git push)
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
