name: Alt-data edge monitor

# Runs the HONEST marginal-edge test forward on a schedule and appends its numbers to a
# growing log — so we accumulate real out-of-sample evidence on whether any alt-data source
# (earnings surprise / news sentiment) EARNS weight over time. It never trades: a zero-edge
# signal in the live book would only churn fees. This is the "keep it learning" job.
#
# The monitor writes docs/research/altdata_monitor.jsonl (one JSON row per run) and posts the
# full report to the run summary. schedule: only fires on the DEFAULT branch, so this starts
# once merged to main; until then use "Run workflow" (workflow_dispatch) to test it.

on:
  schedule:
    # 06:00 UTC on the 1st of each month (fundamentals are quarterly; monthly gives the
    # walk-forward a fresh OOS month each run).
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write      # commit the appended metrics log

concurrency:
  group: altdata-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run the honest alt-data edge test and log its metrics
        env:
          # TIINGO unlocks delisted US prices (survivorship-free point-in-time run).
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY || secrets.TIINGO_API_SECRET }}
        run: |
          # best-effort: refresh the free survivorship-clean S&P 500 membership cache
          python -c "from trading_algo import constituents as c; print('constituents ->', c.download_constituents('US'))" \
            || echo "constituents download failed — falling back to current universe"
          mkdir -p docs/research
          python -m trading_algo.mlreport --point-in-time --with-altdata \
            --emit-metrics docs/research/altdata_monitor.jsonl | tee altdata_report.md
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat altdata_report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Commit the appended metrics log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/research/altdata_monitor.jsonl
          if git diff --cached --quiet; then
            echo "No new metrics row to commit."
          else
            git commit -m "chore: alt-data edge monitor [skip ci]"
            # Rebase-safe push — the scheme shared by every state-committing workflow
            # (see tests/test_workflow_sanity.py): abort any in-progress rebase before
            # every try, never a plain pull, and a genuinely failed push fails the step.
            for attempt in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              git fetch origin ${{ github.ref_name }}
              git rebase origin/${{ github.ref_name }} || { git rebase --abort || true; git rebase -X theirs origin/${{ github.ref_name }}; }
              if git push; then
                break
              elif [ "$attempt" = 3 ]; then
                echo "::error::git push failed after 3 attempts"
                exit 1
              fi
              sleep $((5 * attempt))
            done
          fi
