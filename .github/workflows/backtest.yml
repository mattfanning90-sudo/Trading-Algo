name: Backtest (real data)

# Manual real-data backtest. GitHub runners have internet, so this fetches live
# Yahoo prices, runs the full AUD portfolio backtest vs the benchmark, and posts
# the report to the run summary (Actions → this run → Summary). Also uploads the
# report + equity curves as a downloadable artifact. Does not commit anything.
#
#   Actions → "Backtest (real data)" → Run workflow

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What to run"
        type: choice
        options: [backtest, tune, defensive, trend, validate]
        default: backtest
      mode:
        description: "Data mode"
        type: choice
        options: [real, synthetic]
        default: real
      region:
        description: "Region for the defensive sweep (defensive task only)"
        type: choice
        options: [US, FTSE, ASX]
        default: US
      point_in_time:
        description: "Point-in-time constituents (needs a constituents file per region)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backtest / tune
        run: |
          SYN="${{ inputs.mode == 'synthetic' && '--synthetic' || '' }}"
          PIT="${{ inputs.point_in_time && '--point-in-time' || '' }}"
          if [ "${{ inputs.task }}" = "tune" ]; then
            python -m trading_algo.tune $SYN | tee backtest_report.md
          elif [ "${{ inputs.task }}" = "defensive" ]; then
            python -m trading_algo.defensive_sweep --region "${{ inputs.region }}" $SYN | tee backtest_report.md
          elif [ "${{ inputs.task }}" = "trend" ]; then
            python -m trading_algo.trend_report $SYN | tee backtest_report.md
          elif [ "${{ inputs.task }}" = "validate" ]; then
            python -m trading_algo.validate --region "${{ inputs.region }}" $SYN | tee backtest_report.md
          else
            python -m trading_algo.report $SYN $PIT --out backtest_report.md
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat backtest_report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload report + equity curves
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: |
            backtest_report.md
            equity_curve_portfolio.csv
            benchmark_curve.csv
          if-no-files-found: warn
