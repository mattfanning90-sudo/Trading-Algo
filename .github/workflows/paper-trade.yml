name: Paper Trade & Publish Dashboard

# Runs the momentum engine in the cloud on a schedule (no machine of yours
# needed), commits the updated paper state back to the repo, and publishes the
# standalone dashboard to GitHub Pages.
#
# ONE-TIME SETUP (repo Settings):
#   • Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   • Settings → Actions → General → Workflow permissions: "Read and write"
# NOTE: `schedule:` only fires on the DEFAULT branch, so merge this to main for
# the cron to start. Until then, use "Run workflow" (workflow_dispatch) to test.

on:
  schedule:
    # Weekdays ~30 min after the US close (UTC; GitHub may delay a few minutes).
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode for this run"
        type: choice
        options: [real, synthetic]
        default: real

permissions:
  contents: write      # commit updated paper state
  # Pages publishing lives in fx-paper.yml and day-paper.yml (their deploy jobs
  # share one 'github-pages' concurrency group); this workflow only updates
  # equity state + exports dashboards.

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      MOMENTUM_STATE_DIR: ${{ github.workspace }}/state
      # synthetic only when explicitly dispatched as such; scheduled = real data
      SYNTH: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'synthetic') && '--synthetic' || '' }}
      # Paper accounts to run & publish. "regions" (optional) restricts an account
      # to a subset (a small account trades US-only to dodge fee drag); "profile"
      # (optional) opens the book from a named strategy/risk preset (see
      # trading_algo/profiles.py) — ultra (3x leverage) and experimental (market-
      # neutral long/short) are ring-fenced into their own EXPERIMENTAL total on
      # the overview, excluded from the headline CORE AUM. Add more here.
      ACCOUNTS: '[{"name":"full","capital":100000,"regions":"","profile":""},{"name":"small","capital":1000,"regions":"US","profile":""},{"name":"ultra","capital":10000,"regions":"","profile":"ultra"},{"name":"experimental","capital":10000,"regions":"","profile":"experimental"}]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run each account (init if new, one pass, export dashboard)
        run: |
          mkdir -p state public
          echo "$ACCOUNTS" | jq -c '.[]' | while read -r acct; do
            name=$(jq -r .name <<<"$acct"); cap=$(jq -r .capital <<<"$acct")
            regions=$(jq -r '.regions // ""' <<<"$acct")
            profile=$(jq -r '.profile // ""' <<<"$acct")
            echo "::group::account $name (initial $cap${regions:+, regions $regions}${profile:+, profile $profile})"
            if [ ! -f "state/paper_state_${name}.json" ]; then
              python -m trading_algo.paper_trade --account "$name" --init --capital "$cap" ${regions:+--regions $regions} ${profile:+--profile $profile} $SYNTH
            fi
            python -m trading_algo.engine --once --account "$name" $SYNTH
            python -m trading_algo.dashboard.export --account "$name" $SYNTH -o "public/${name}.html"
            echo "::endgroup::"
          done

      - name: Build the dashboard landing page
        run: |
          {
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
            echo '<title>Multi-Region Momentum — Paper Accounts</title>'
            echo '<style>body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;'
            echo 'background:#0d1117;color:#e6edf3;margin:0;padding:3rem;max-width:720px}'
            echo 'h1{font-weight:700;margin:0 0 .25rem}.sub{color:#8b949e;margin:0 0 2rem}'
            echo 'a.card{display:block;margin:1rem 0;padding:1.25rem 1.5rem;border:1px solid #30363d;'
            echo 'border-radius:14px;background:#161b22;color:#e6edf3;text-decoration:none}'
            echo 'a.card:hover{border-color:#58a6ff}.name{font-size:1.25rem;font-weight:600;color:#58a6ff}'
            echo '.amt{color:#8b949e;font-size:.95rem}</style></head><body>'
            echo '<h1>Multi-Region Momentum</h1>'
            echo "<p class=sub>Paper accounts · base currency AUD · updated $(date -u '+%Y-%m-%d %H:%M UTC')</p>"
            echo "$ACCOUNTS" | jq -r '.[] | "<a class=card href=\"\(.name).html\"><div class=name>\(.name)</div><div class=amt>initial \(.capital) AUD</div></a>"'
            echo '</body></html>'
          } > public/index.html

      - name: Commit updated paper state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A state/
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "chore: update paper state [skip ci]"
            # Rebase-safe push — used verbatim in every state-committing
            # workflow (day-paper / fx-paper / paper-trade). Rules:
            #  * never retry mid-rebase: 'git rebase --abort' before EVERY try;
            #  * no merge commits (never a plain pull);
            #  * on a content conflict in the state JSON, '-X theirs' prefers
            #    the commit being REPLAYED — i.e. OUR just-computed state,
            #    the correct winner (both runners computed the same or a
            #    fresher bar);
            #  * a genuinely failed push fails the step — no '|| true'.
            for attempt in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              git fetch origin ${{ github.ref_name }}
              git rebase origin/${{ github.ref_name }} || { git rebase --abort || true; git rebase -X theirs origin/${{ github.ref_name }}; }
              if git push; then
                break
              elif [ "$attempt" = 3 ]; then
                echo "::error::git push failed after 3 attempts"
                exit 1
              fi
              sleep $((5 * attempt))
            done
          fi

      # Dashboards are published to GitHub Pages by fx-paper.yml (single Pages
      # deployer); this workflow exports them into public/ and updates state only.
