name: FX Paper Trading (live)

# Runs the multi-agent FX paper books (matt + partner) unattended in the cloud
# on REAL Yahoo FX + crypto data, commits the updated state back to the repo so
# the books compound across runs, then publishes a candlestick dashboard (with
# the reasoning behind every trade) to GitHub Pages.
#
# TWO Pages publishers exist — this nightly workflow and the hourly
# day-paper.yml — and their deploy jobs share one 'github-pages' concurrency
# group so deploys serialize instead of 409ing. The scheme is safe only because
# every deploy publishes the WHOLE site (both run scripts/build_site.sh), so a
# superseded intermediate deploy loses nothing. This workflow also re-exports
# the equity dashboards so nothing is lost.
#
# ONE-TIME SETUP (repo Settings):
#   • Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   • Settings → Actions → General → Workflow permissions: "Read and write"
# NOTE: schedule: only fires on the DEFAULT branch.

on:
  schedule:
    - cron: "0 23 * * 1-5"   # weekdays 23:00 UTC — after the NY close
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode"
        type: choice
        options: [real, synthetic]
        default: real
      use_ml:
        description: "Include the deep-learning agent (retrained fresh each run)"
        type: boolean
        default: true

permissions:
  contents: write      # commit updated paper state
  pages: write         # publish the dashboard
  id-token: write      # required by deploy-pages

concurrency:
  group: fx-paper
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FX_STATE_DIR: ${{ github.workspace }}/state
      MOMENTUM_STATE_DIR: ${{ github.workspace }}/state
      SYNTH: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'synthetic') && '--synthetic' || '' }}
      USE_ML: ${{ (github.event_name == 'workflow_dispatch' && inputs.use_ml == false) && 'false' || 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore parquet market-data cache
        # Persists trading_algo/forex/.cache across runners (shared prefix with
        # day-paper.yml so the nightly run warms from the hourly runs and vice
        # versa). Unique key -> always saves; restore-keys picks the most recent.
        uses: actions/cache@v4
        with:
          path: trading_algo/forex/.cache
          key: fx-parquet-${{ github.run_id }}
          restore-keys: fx-parquet-

      - name: Advance the FX paper books (init if new, one daily pass)
        run: |
          mkdir -p state public
          python -m trading_algo.forex.paper --init $SYNTH
          ML_FLAG=""
          if [ "$USE_ML" = "true" ]; then
            echo "::group::train deep-learning agent (best-effort)"
            python -m trading_algo.forex.train $SYNTH --seeds 2 --no-ml \
              --models-dir trading_algo/forex/models \
              || echo "training failed — falling back to the technical agents"
            echo "::endgroup::"
            ML_FLAG="--ml"
          fi
          python -m trading_algo.forex.engine --once $ML_FLAG $SYNTH

      - name: Build site (dashboards + landing page)
        # NEWS_API_KEY is optional: with it set (repo secret, a Financial Modeling
        # Prep key), the daily summary flags high-impact economic releases that hit
        # a traded currency. Without it the section silently omits — see news.py.
        # MOMENTUM_STATE_DIR / SYNTH are job-level; restated here to make the
        # script's env contract explicit.
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MOMENTUM_STATE_DIR: ${{ github.workspace }}/state
        run: bash scripts/build_site.sh

      - name: Commit updated paper state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A state/
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "chore: update FX paper state [skip ci]"
            # Rebase-safe push — used verbatim in every state-committing
            # workflow (day-paper / fx-paper / paper-trade). Rules:
            #  * never retry mid-rebase: 'git rebase --abort' before EVERY try;
            #  * no merge commits (never a plain pull);
            #  * on a content conflict in the state JSON, '-X theirs' prefers
            #    the commit being REPLAYED — i.e. OUR just-computed state,
            #    the correct winner (both runners computed the same or a
            #    fresher bar);
            #  * a genuinely failed push fails the step — no '|| true'.
            for attempt in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              git fetch origin ${{ github.ref_name }}
              git rebase origin/${{ github.ref_name }} || { git rebase --abort || true; git rebase -X theirs origin/${{ github.ref_name }}; }
              if git push; then
                break
              elif [ "$attempt" = 3 ]; then
                echo "::error::git push failed after 3 attempts"
                exit 1
              fi
              sleep $((5 * attempt))
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: run
    runs-on: ubuntu-latest
    # Shared with day-paper's deploy job: GitHub's documented fix for
    # deploy-pages 409s is one concurrency group across all Pages publishers.
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy_retry.outputs.page_url }}
    steps:
      # Pages occasionally rejects a deploy with "try again later" when another
      # publish is mid-flight (the shared concurrency group serialises jobs, but
      # the Pages backend can still transiently reject). A failed deploy silently
      # strands the LIVE site behind the committed state, so tolerate the first
      # failure and retry once after a short back-off rather than leaving it stale.
      - name: Deploy to GitHub Pages
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Back off before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 25
      - name: Deploy to GitHub Pages (retry)
        id: deploy_retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
