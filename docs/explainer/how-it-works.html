<style>
/* ============================================================
   "The machine, end to end" — animated walkthrough of a
   multi-region momentum + FX trading system.
   Self-contained: no external fonts, scripts or styles.
   ============================================================ */

:root{
  /* light theme (default) */
  --bg:#EEF2F1; --bg2:#E3E9E7; --panel:#FBFDFC; --panel2:#F1F5F3;
  --ink:#141D27; --ink-dim:#455563; --muted:#7B8A95; --line:#D6DFDC; --line2:#C3CFCB;
  --us:#1C79DC; --asx:#B0771A; --ftse:#C23E7F; --aud:#0E9E76;
  --on:#0E9E76; --off:#D53B2A; --cash:#8A97A1;
  --glow:0; --scan:0;
  color-scheme:light;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#080B10; --bg2:#0C1118; --panel:#0F151D; --panel2:#131C25;
    --ink:#D6DEE6; --ink-dim:#8A98A5; --muted:#5C6A77; --line:#1A2430; --line2:#25323E;
    --us:#4CA9FF; --asx:#F0B32A; --ftse:#EC77AD; --aud:#33E0AE;
    --on:#33E0AE; --off:#FF5F52; --cash:#5C6A77;
    --glow:1; --scan:1;
    color-scheme:dark;
  }
}
/* explicit toggle overrides the media query in both directions */
:root[data-theme="light"]{
  --bg:#EEF2F1; --bg2:#E3E9E7; --panel:#FBFDFC; --panel2:#F1F5F3;
  --ink:#141D27; --ink-dim:#455563; --muted:#7B8A95; --line:#D6DFDC; --line2:#C3CFCB;
  --us:#1C79DC; --asx:#B0771A; --ftse:#C23E7F; --aud:#0E9E76;
  --on:#0E9E76; --off:#D53B2A; --cash:#8A97A1;
  --glow:0; --scan:0; color-scheme:light;
}
:root[data-theme="dark"]{
  --bg:#080B10; --bg2:#0C1118; --panel:#0F151D; --panel2:#131C25;
  --ink:#D6DEE6; --ink-dim:#8A98A5; --muted:#5C6A77; --line:#1A2430; --line2:#25323E;
  --us:#4CA9FF; --asx:#F0B32A; --ftse:#EC77AD; --aud:#33E0AE;
  --on:#33E0AE; --off:#FF5F52; --cash:#5C6A77;
  --glow:1; --scan:1; color-scheme:dark;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
:root{
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,"Liberation Mono",monospace;
}

#app{
  position:fixed; inset:0;
  display:grid;
  grid-template-rows:auto 1fr auto;
  background:
    radial-gradient(120% 90% at 50% -10%, var(--bg2), var(--bg) 60%);
}

/* ---------- top chrome ---------- */
.top{
  display:flex; align-items:center; gap:16px;
  padding:14px 22px 10px;
  border-bottom:1px solid var(--line);
  min-height:56px;
}
.brand{display:flex; flex-direction:column; gap:3px; min-width:0}
.brand .t{
  font-family:var(--mono); font-weight:600; font-size:14px; letter-spacing:.02em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.brand .s{ font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase }
.caption{
  flex:1 1 auto; min-width:0;
  display:flex; flex-direction:column; gap:2px; align-items:flex-end;
  text-align:right;
}
.caption .ct{ font-family:var(--mono); font-size:13px; color:var(--ink); font-weight:600 }
.caption .cs{ font-size:12px; color:var(--ink-dim); max-width:52ch; line-height:1.35 }

.chips{ display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end }
.chip{
  font-family:var(--mono); font-size:10.5px; letter-spacing:.04em;
  padding:3px 8px; border:1px solid var(--line2); border-radius:999px;
  color:var(--ink-dim); white-space:nowrap; background:var(--panel);
}
.chip.on{ color:var(--on); border-color:color-mix(in srgb, var(--on) 45%, var(--line2)) }
.chip.warn{ color:var(--asx); border-color:color-mix(in srgb, var(--asx) 45%, var(--line2)) }
.chip b{ color:var(--muted); font-weight:600 }

/* ---------- stage ---------- */
.stage{ position:relative; overflow:hidden }
canvas{ position:absolute; inset:0; width:100%; height:100%; display:block }

/* ---------- transport ---------- */
.transport{
  display:flex; align-items:center; gap:14px;
  padding:12px 22px 16px;
  border-top:1px solid var(--line);
}
.tbtn{
  appearance:none; cursor:pointer;
  background:var(--panel); color:var(--ink);
  border:1px solid var(--line2); border-radius:8px;
  height:34px; min-width:34px; padding:0 9px;
  font-family:var(--mono); font-size:13px; line-height:1;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color .15s, background .15s, color .15s;
}
.tbtn:hover{ border-color:color-mix(in srgb, var(--aud) 55%, var(--line2)); color:var(--ink) }
.tbtn:focus-visible{ outline:2px solid var(--aud); outline-offset:2px }
.tbtn.primary{ background:color-mix(in srgb, var(--aud) 16%, var(--panel)); border-color:color-mix(in srgb, var(--aud) 50%, var(--line2)) }
.tbtn.wide{ min-width:46px }

.timeline{
  position:relative; flex:1 1 auto; height:34px; cursor:pointer;
  display:flex; align-items:center; touch-action:none;
}
.timeline:focus-visible{ outline:2px solid var(--aud); outline-offset:3px; border-radius:6px }
.tl-track{
  position:absolute; left:0; right:0; height:6px; border-radius:999px;
  background:var(--line); overflow:hidden;
}
.tl-fill{
  position:absolute; left:0; top:0; bottom:0; width:0%;
  background:linear-gradient(90deg, color-mix(in srgb,var(--aud) 60%, var(--us)), var(--aud));
  border-radius:999px;
}
.tl-marks{ position:absolute; inset:0 }
.tl-mark{
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:2px; height:14px; background:var(--line2); border-radius:2px;
}
.tl-mark.done{ background:color-mix(in srgb, var(--aud) 55%, var(--line2)) }
.tl-mark .lbl{
  position:absolute; top:-22px; left:50%; transform:translateX(-50%);
  font-family:var(--mono); font-size:9.5px; letter-spacing:.05em;
  color:var(--muted); text-transform:uppercase; white-space:nowrap;
  opacity:0; transition:opacity .15s; pointer-events:none;
}
.tl-mark.active .lbl, .timeline:hover .tl-mark:hover .lbl{ opacity:1 }
.tl-mark.active{ background:var(--aud) }
.tl-mark.hit{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:22px; height:26px; background:transparent; border:0; padding:0; cursor:pointer;
}
.tl-head{
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:13px; height:13px; border-radius:50%;
  background:var(--aud); box-shadow:0 0 0 3px color-mix(in srgb,var(--aud) 25%, transparent);
  pointer-events:none;
}
.clock{
  font-family:var(--mono); font-size:12px; color:var(--ink-dim);
  font-variant-numeric:tabular-nums; white-space:nowrap; min-width:96px; text-align:right;
}

/* light-theme figure legibility for chips border */
:root[data-theme="light"] .chip, :root:not([data-theme]) .chip{ box-shadow:none }

@media (max-width:760px){
  .caption .cs{ display:none }
  .brand .s{ display:none }
  .tl-mark .lbl{ display:none }
  .transport{ gap:9px; padding:10px 12px 14px }
  .top{ padding:10px 14px 8px }
}
@media (prefers-reduced-motion: reduce){
  .tl-fill, .tl-head{ transition:none }
}
</style>

<div id="app">
  <header class="top">
    <div class="brand">
      <div class="t">THE MACHINE, END&nbsp;TO&nbsp;END</div>
      <div class="s">Multi-region momentum &middot; parallel FX engine</div>
    </div>
    <div class="caption">
      <div class="ct" id="capTitle">Press play</div>
      <div class="cs" id="capText">Real signals &amp; real books &mdash; a 12&#8209;1 momentum system across three regional sleeves, combined in AUD, plus an independent FX book.</div>
      <div class="chips" id="chips">
        <span class="chip" id="asofChip"><b>real</b></span>
        <span class="chip on">no lookahead</span>
        <span class="chip on">net of costs</span>
        <span class="chip on">walk&#8209;forward</span>
      </div>
    </div>
  </header>

  <main class="stage">
    <canvas id="c"></canvas>
  </main>

  <footer class="transport">
    <button class="tbtn primary" id="play" aria-label="Play or pause">&#9654;</button>

    <button class="tbtn" id="fwd" aria-label="Next stage">&#9654;&#9654;</button>
    <div class="timeline" id="timeline" role="slider" tabindex="0"

      <div class="tl-track"><div class="tl-fill" id="tlFill"></div></div>
      <div class="tl-marks" id="tlMarks"></div>
      <div class="tl-head" id="tlHead"></div>
    </div>
    <button class="tbtn" id="replay" aria-label="Replay from start">&#8635;</button>
    <button class="tbtn wide" id="speed" aria-label="Playback speed">1&times;</button>
    <div class="clock" id="clock">00:00 / 00:00</div>
  </footer>
</div>

  // 5. Drawing
  // ---------------------------------------------------------------
  function setFont(px, weight){ ctx.font=(weight||400)+' '+px+'px ui-monospace,"SF Mono",Menlo,Consolas,monospace'; }

  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    // faint grid
    ctx.save();
    ctx.strokeStyle=rgba(PAL.line.replace('#',''), 1);
    ctx.globalAlpha=0.5;
    ctx.lineWidth=1;
    var step=Math.max(46, W/26);
    ctx.beginPath();
    for(var x=M.ml;x<=W-M.mr;x+=step){ ctx.moveTo(x,M.eqTop-6); ctx.lineTo(x,M.fxTop+M.fxH); }
    ctx.stroke();
    ctx.restore();
  }

  function drawStations(activeKey){
    var labels=['UNIVERSE','RANK','FILTER','SIZE','SLEEVES','COMBINE'];
    var keys  =['universe','rank','filter','size','sleeves','combine'];
    setFont(11,600);
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    for(var i=0;i<6;i++){
      var active = keys[i]===activeKey;
      ctx.fillStyle = active ? PAL.aud : PAL.muted;
      ctx.globalAlpha = active?1:0.55;
      ctx.fillText(labels[i], M.stX[i], M.eqTop-14);
      // tick under label
      ctx.globalAlpha = active?0.9:0.3;
      ctx.strokeStyle= active?PAL.aud:PAL.line2; ctx.lineWidth= active?2:1;
      ctx.beginPath(); ctx.moveTo(M.stX[i]-16,M.eqTop-8); ctx.lineTo(M.stX[i]+16,M.eqTop-8); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  function drawBandLabels(alpha){
    ctx.save(); ctx.globalAlpha=alpha;
    setFont(11,600); ctx.textAlign='left'; ctx.textBaseline='middle';
    REGIONS.forEach(function(R,ri){
      ctx.fillStyle=PAL[R.col];
      ctx.fillText(R.key, M.ml-2, M.bandTop(ri)+12);
      ctx.globalAlpha=alpha*0.6; setFont(9.5,400);
      ctx.fillStyle=PAL.muted;
      ctx.fillText(R.idx+' · '+R.ccy, M.ml-2, M.bandTop(ri)+26);
      ctx.globalAlpha=alpha; setFont(11,600);
    });
    ctx.restore();
  }

  function drawToken(s, t, activeKey){
    if(s.a<=0.01) return;
    var c = s.dim ? PAL.cash : regCol(t);
    ctx.save();
    ctx.globalAlpha = s.a;
    // weight / momentum bar behind
    if(s.barType==='weight'){
      var maxLen=M.innerW*0.10;
      var len=Math.max(4, (s.bar/W_MAX)*maxLen);
      ctx.fillStyle=rgba(c.replace('#',''),0.30*s.a);
      roundRect(s.x+s.r+4, s.y-s.r*0.55, len, s.r*1.1, 3); ctx.fill();
      ctx.fillStyle=rgba(c.replace('#',''),0.95*s.a);
      roundRect(s.x+s.r+4, s.y-s.r*0.55, len, s.r*1.1, 3); ctx.fill();
      setFont(9.5,600); ctx.fillStyle=PAL.ink; ctx.globalAlpha=s.a;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText((s.bar*100).toFixed(0)+'%', s.x+s.r+8+len, s.y);
    } else if(s.barType==='mom'){
      var mlen=M.innerW*0.115;
      var bl=(t.mom/MOM_MAX)*mlen;
      var pos=t.mom>=0;
      ctx.fillStyle=rgba((pos?c:PAL.off).replace('#',''), 0.55*s.a);
      var bx = s.x+s.r+5;
      roundRect(bx, s.y-3, Math.max(3,Math.abs(bl)), 6, 2); ctx.fill();
      setFont(9,400); ctx.fillStyle=PAL.ink_dim||PAL['ink-dim']; ctx.globalAlpha=s.a*0.8;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText((t.mom>=0?'+':'')+(t.mom*100).toFixed(0)+'%', bx+Math.max(3,Math.abs(bl))+6, s.y);
    }
    ctx.globalAlpha=s.a;
    // node
    if(PAL.glow && !s.dim){ ctx.shadowColor=rgba(c.replace('#',''),0.9); ctx.shadowBlur=10; }
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=rgba(c.replace('#',''), s.dim?0.5:0.9); ctx.fill();
    ctx.shadowBlur=0;
    ctx.lineWidth=1.4; ctx.strokeStyle=rgba(c.replace('#',''),1); ctx.stroke();
    // ticker label — above in the universe grid, beside the node everywhere else
    if(s.r>=8 && s.a>0.35){
      ctx.globalAlpha=s.a; ctx.fillStyle=PAL.ink;
      if(activeKey==='universe'){
        setFont(8.5,600); ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(t.tk, s.x, s.y - s.r - 7);
      } else {
        setFont(9,700); ctx.textAlign='right'; ctx.textBaseline='middle';
        ctx.fillText(t.tk, s.x - s.r - 5, s.y);
      }
    }
    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    if(w<0){ x+=w; w=-w; }
    r=Math.min(r,h/2,w/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  // --- per-beat overlays ---
  function overlayRank(p){
    var a=easeOut(clamp(p*1.3,0,1));
    var cx=(M.stX[3]+M.stX[5])/2, cy=M.eqTop+M.eqH*0.40;
    ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
    setFont(clamp(W*0.016,13,20),700); ctx.fillStyle=PAL.aud;
    ctx.fillText('score(t) = P(t−21) / P(t−252) − 1', cx, cy);
    setFont(11,400); ctx.fillStyle=PAL.muted;
    ctx.fillText('12‑1 momentum — last 12 months, skipping the most recent', cx, cy+24);
    ctx.fillText('strongest names rise to the top of each region', cx, cy+40);
    ctx.restore();
  }

    REGIONS.forEach(function(R,ri){
      var on=R.regimeOn;

      ctx.strokeStyle=rgba(col.replace('#',''),0.7); ctx.lineWidth=1; roundRect(x,y-11,96,22,6); ctx.stroke();
      setFont(10.5,700); ctx.fillStyle=col; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(on?'RISK‑ON':'RISK‑OFF', x+9, y);

    });
    // cash strip label
    ctx.save(); ctx.globalAlpha=a*0.8; setFont(10,600);
    ctx.fillStyle=PAL.cash; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('── dropped → held as cash ──', W*0.5, M.cashY+M.R*2.1);
    ctx.restore();
    // ASX callout
    ctx.save(); ctx.globalAlpha=a; setFont(10.5,600);
    ctx.fillStyle=PAL.off; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('index < 200d MA → 100% cash', M.stX[2]+M.R*3.4, M.bandTop(1)+34);
    ctx.restore();

  function overlaySize(p){
    var a=easeOut(clamp(p*1.3,0,1));
    var cx=(M.stX[4]+M.stX[5])/2, cy=M.eqTop+M.eqH*0.30;
    ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
    setFont(clamp(W*0.014,12,17),700); ctx.fillStyle=PAL.aud;
    ctx.fillText('inverse‑vol weights', cx, cy);
    setFont(11,400); ctx.fillStyle=PAL.muted;
    ctx.fillText('biggest slots to the lowest‑vol names · vol‑targeted', cx, cy+22);
    ctx.fillText('one code path — strategy.compute_targets', cx, cy+38);
    ctx.restore();
  }

  function overlaySleeves(p){
    var a=easeOut(clamp(p*1.3,0,1));
    REGIONS.forEach(function(R,ri){
      var x0=M.stX[4]-M.innerW*0.055, x1=M.stX[4]+M.innerW*0.135;
      var yT=M.bandTop(ri)+6, yB=M.bandTop(ri)+M.bandH-8;
      ctx.save(); ctx.globalAlpha=a;
      ctx.strokeStyle=rgba(PAL[R.col].replace('#',''),0.40); ctx.lineWidth=1;
      roundRect(x0, yT, (x1-x0), (yB-yT), 8); ctx.stroke();
      // real standalone-sleeve metrics (2012–2026), compact at panel top
      var m=R.metrics||{};
      function pct(v,d){ return v==null?'—':((v>=0?'+':'')+(v*100).toFixed(d||0)+'%'); }
      setFont(9,600); ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillStyle=PAL[R.col];
      ctx.fillText(pct(m.cagr,1)+'  Sh '+(m.sharpe==null?'—':m.sharpe.toFixed(2))
                   +'  DD '+pct(m.max_drawdown,0), x0+9, yT+11);
      if(!R.regimeOn){
        setFont(11,700); ctx.fillStyle=PAL.cash; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('100% CASH', (x0+x1)/2, (yT+yB)/2+6);
        setFont(8.5,400); ctx.fillStyle=PAL.muted;
        ctx.fillText('index below 200d MA', (x0+x1)/2, (yT+yB)/2+20);
      }
      ctx.restore();
    });
  }

  function overlayCombine(p){
    // draw the REAL AUD equity curve (2012–2026) + benchmark, progressively
    var x0=M.stX[4]+M.innerW*0.02, x1=W-M.mr;
    var yTop=M.eqTop+M.eqH*0.12, yBot=M.eqTop+M.eqH*0.86;
    var S=EQ_CURVE, B=EQ_BENCH, n=S.length;
    var lo=Infinity, hi=-Infinity, i;
    for(i=0;i<n;i++){ lo=Math.min(lo,S[i][1]); hi=Math.max(hi,S[i][1]); }
    for(i=0;i<B.length;i++){ lo=Math.min(lo,B[i][1]); hi=Math.max(hi,B[i][1]); }
    var rng=(hi-lo)||1;
    var draw=easeIO(clamp(p*1.05,0,1)), prog=draw*(n-1);
    function px(i,len){ return x0+(x1-x0)*(i/(len-1)); }
    function py(v){ return yBot-((v-lo)/rng)*(yBot-yTop); }

    // FX prism (three sleeves merge → curve start)
    var a=easeOut(clamp(p*1.6,0,1));
    ctx.save(); ctx.globalAlpha=a*0.9;
    REGIONS.forEach(function(R,ri){
      var s=[M.stX[4]-M.innerW*0.01, M.bandY(ri)];
      ctx.strokeStyle=rgba(PAL[R.col].replace('#',''),0.5); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(s[0],s[1]);
      ctx.quadraticCurveTo(x0-M.innerW*0.02, (s[1]+py(S[0][1]))/2, x0, py(S[0][1])); ctx.stroke();
    });
    setFont(10,700); ctx.fillStyle=PAL.aud; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.globalAlpha=a;
    ctx.fillText('FX → AUD', x0-M.innerW*0.02, M.eqTop+M.eqH*0.5-14);
    ctx.font='400 9.5px ui-monospace,Menlo,monospace'; ctx.fillStyle=PAL.muted;
    ctx.fillText('equal 1/3 each', x0-M.innerW*0.02, M.eqTop+M.eqH*0.5+2);
    ctx.restore();

    // benchmark (faint dashed), progressive
    ctx.save();
    var bn=B.length, bmax=Math.floor(draw*(bn-1));
    ctx.beginPath();
    for(i=0;i<=bmax;i++){ var X=px(i,bn),Y=py(B[i][1]); if(i===0)ctx.moveTo(X,Y); else ctx.lineTo(X,Y); }
    ctx.strokeStyle=rgba(PAL.muted.replace('#',''),0.6); ctx.lineWidth=1.3;
    ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();

    // strategy curve (bold, with area)
    ctx.save();
    var maxI=Math.floor(prog), headX, headY, f;
    ctx.beginPath(); ctx.moveTo(px(0,n),py(S[0][1]));
    for(i=1;i<=maxI;i++) ctx.lineTo(px(i,n),py(S[i][1]));
    if(maxI<n-1){ f=prog-maxI; headX=lerp(px(maxI,n),px(maxI+1,n),f); headY=lerp(py(S[maxI][1]),py(S[maxI+1][1]),f); ctx.lineTo(headX,headY); }
    else { headX=px(n-1,n); headY=py(S[n-1][1]); }
    ctx.save(); ctx.lineTo(headX,yBot); ctx.lineTo(px(0,n),yBot); ctx.closePath();
    var grad=ctx.createLinearGradient(0,yTop,0,yBot);
    grad.addColorStop(0,rgba(PAL.aud.replace('#',''),0.26)); grad.addColorStop(1,rgba(PAL.aud.replace('#',''),0.0));
    ctx.fillStyle=grad; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.moveTo(px(0,n),py(S[0][1]));
    for(i=1;i<=maxI;i++) ctx.lineTo(px(i,n),py(S[i][1]));
    ctx.lineTo(headX,headY);
    if(PAL.glow){ ctx.shadowColor=rgba(PAL.aud.replace('#',''),0.8); ctx.shadowBlur=12; }
    ctx.strokeStyle=PAL.aud; ctx.lineWidth=2.2; ctx.lineJoin='round'; ctx.stroke(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(headX,headY,3.2,0,Math.PI*2); ctx.fillStyle=PAL.aud; ctx.fill();
    ctx.restore();

    // labels + REAL metrics
    setFont(11,700); ctx.fillStyle=PAL.aud; ctx.textAlign='right'; ctx.textBaseline='alphabetic';
    ctx.fillText('COMBINED · AUD', x1, yTop-8);
    if(draw>0.25){
      setFont(9,600); ctx.fillStyle=PAL.muted; ctx.textAlign='left';
      ctx.fillText('– – benchmark (buy & hold)', x0, yTop-8);
    }
    if(draw>0.55){
      var m=EQ_META.metrics, bm=EQ_META.benchmark_metrics;
      var totret=(S[n-1][1]/EQ_META.initial-1)*100;
      ctx.textAlign='right';
      setFont(clamp(W*0.012,11,15),700); ctx.fillStyle=PAL.aud;
      ctx.fillText('+'+totret.toFixed(0)+'%   '+S[0][0].slice(0,4)+'–'+S[n-1][0].slice(0,4), x1, yBot+18);
      setFont(9.5,400); ctx.fillStyle=PAL['ink-dim'];
      ctx.fillText('CAGR '+(m.cagr*100).toFixed(1)+'%  ·  vol '+(m.ann_vol*100).toFixed(1)
        +'%  ·  Sharpe '+m.sharpe.toFixed(2)+'  ·  maxDD '+(m.max_drawdown*100).toFixed(1)+'%', x1, yBot+34);
      setFont(9,400); ctx.fillStyle=PAL.muted;
      ctx.fillText('vs benchmark maxDD '+(bm.max_drawdown*100).toFixed(0)
        +'%  ·  net of costs · backtest, not live‑traded', x1, yBot+48);
    }
  }

  // --- FX parallel track (active over size/sleeves/combine) ---
  function drawFXtrack(clockT){
    var start=STARTS[4]; // size
    var fp=clamp((clockT-start)/(T-start),0,1);
    var appear=easeOut(clamp((clockT-start)/1.2,0,1));
    if(appear<=0.01) { drawFXframe(0); return; }
    drawFXframe(appear, fp);
  }
  function drawFXframe(alpha, fp){
    fp=fp||0;
    var y0=M.fxTop, hgt=M.fxH, x0=M.ml, x1=W-M.mr;
    ctx.save();
    // divider + label
    ctx.globalAlpha=0.6*Math.max(alpha,0.25);
    ctx.strokeStyle=PAL.line2; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x0,y0-8); ctx.lineTo(x1,y0-8); ctx.stroke();
    setFont(10.5,700); ctx.fillStyle=alpha>0.2?PAL.ink:PAL.muted; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.globalAlpha=Math.max(alpha,0.35);
    ctx.fillText('FX ENGINE', x0, y0+4);
    setFont(9,400); ctx.fillStyle=PAL.muted;
    ctx.fillText('independent · long/short · FX + crypto', x0, y0+18);
    ctx.restore();
    if(alpha<=0.02) return;

    ctx.save(); ctx.globalAlpha=alpha;
    var midY=y0+hgt*0.55;
    // agents (left)
    var ax=x0+M.innerW*0.205;
    var ensX=x0+M.innerW*0.46;
    var bookX=x0+M.innerW*0.68;
    var aTop=y0+hgt*0.18, aStep=(hgt*0.72)/(FX_AGENTS.length-1);
    var vote=easeOut(clamp(fp*3,0,1));       // votes travel in during size
    var ens=easeOut(clamp((fp-0.33)*3,0,1)); // ensemble forms during sleeves
    var book=easeOut(clamp((fp-0.62)*3,0,1));// book during combine

    // wires agents -> ensemble
    FX_AGENTS.forEach(function(nm,i){
      var ay=aTop+aStep*i;
      ctx.strokeStyle=rgba(PAL.us.replace('#',''),0.20+0.25*vote);
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(ax+6,ay);
      ctx.quadraticCurveTo((ax+ensX)/2, midY, ensX-12, midY); ctx.stroke();
      // moving vote dot
      if(vote>0 && vote<1){
        var tt=(vote+ i*0.06)%1;
        var mx=lerp(ax+6,ensX-12,tt), my=lerp(ay,midY,tt);
        ctx.beginPath(); ctx.arc(mx,my,2.2,0,Math.PI*2); ctx.fillStyle=PAL.us; ctx.fill();
      }
      // agent node
      ctx.beginPath(); ctx.arc(ax,ay,4.5,0,Math.PI*2);
      ctx.fillStyle=rgba(PAL.us.replace('#',''),0.85); ctx.fill();
      setFont(9.5,600); ctx.fillStyle=PAL.ink_dim||PAL['ink-dim']; ctx.textAlign='right'; ctx.textBaseline='middle';
      ctx.fillText(nm, ax-9, ay);
    });
    setFont(9,400); ctx.fillStyle=PAL.muted; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('agents', ax, y0+hgt*0.10);

    // ensemble node (dial)
    ctx.save();
    if(PAL.glow){ ctx.shadowColor=rgba(PAL.aud.replace('#',''),0.7); ctx.shadowBlur=10*ens; }
    ctx.beginPath(); ctx.arc(ensX,midY,13,0,Math.PI*2);
    ctx.fillStyle=rgba(PAL.aud.replace('#',''),0.14+0.10*ens);
    ctx.fill();
    ctx.strokeStyle=rgba(PAL.aud.replace('#',''),0.5+0.4*ens); ctx.lineWidth=1.5; ctx.stroke();
    // dial arc
    ctx.beginPath(); ctx.arc(ensX,midY,13,-Math.PI/2, -Math.PI/2+Math.PI*2*ens*0.8);
    ctx.strokeStyle=PAL.aud; ctx.lineWidth=2.4; ctx.stroke();
    ctx.restore();
    setFont(9,400); ctx.fillStyle=PAL.muted; ctx.textAlign='center';
    ctx.fillText('perf‑weighted', ensX, y0+hgt*0.10);
    ctx.fillText('ensemble', ensX, y0+hgt*0.10+11);

    // wire ensemble -> book
    ctx.strokeStyle=rgba(PAL.aud.replace('#',''),0.2+0.4*book); ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(ensX+13,midY); ctx.lineTo(bookX-M.innerW*0.02,midY); ctx.stroke();

    // long/short book (right) — real signed weights, sized to |weight| / max
    var bx=bookX, bw=M.innerW*0.165, colw=bw/FX_PAIRS.length;
    var zero=midY;
    FX_PAIRS.forEach(function(pr,i){
      var cx=bx+colw*(i+0.5);
      var h=(hgt*0.26)*(pr.w/FXW_MAX)*book;
      var up=pr.pos>0;
      var col=up?PAL.on:PAL.off;
      ctx.fillStyle=rgba(col.replace('#',''), pr.regime==='ranging'?0.55:0.9);
      var by = up? zero-h : zero;
      roundRect(cx-colw*0.30, by, colw*0.60, h, 2); ctx.fill();
      // signed % just past the bar tip
      setFont(7.5,700); ctx.fillStyle=rgba(col.replace('#',''),0.95); ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      if(book>0.6) ctx.fillText((up?'+':'−')+Math.round(pr.w*100)+'%', cx, up? by-3 : by+h+9);
      setFont(7.5,600); ctx.fillStyle=PAL.muted; ctx.textBaseline='alphabetic';
      ctx.fillText(pr.p, cx, y0+hgt*0.97);   // labels below the bars, clear of shorts
    });
    // zero line
    ctx.strokeStyle=rgba(PAL.muted.replace('#',''),0.5); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx-4,zero); ctx.lineTo(bx+bw+4,zero); ctx.stroke();
    setFont(9,400); ctx.fillStyle=PAL.muted; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('long / short book', bx+bw/2, y0+hgt*0.10);

    // accounts (far right) — real matt book equity + return
    if(book>0.3){
      var mattRet=(DATA.fx.equity/DATA.fx.initial-1)*100;
      var accs=[{n:'matt', v:'A$'+Math.round(DATA.fx.equity)+'  '+(mattRet>=0?'+':'−')+Math.abs(mattRet).toFixed(1)+'%'},
                {n:'partner', v:'isolated book'}];
      var axx=x1-M.innerW*0.004, tw=M.innerW*0.135;
      ctx.textBaseline='middle';
      accs.forEach(function(ac,i){
        var yy=midY-10+i*21;
        ctx.globalAlpha=alpha*clamp((book-0.3)/0.5,0,1);
        ctx.fillStyle=rgba(PAL.aud.replace('#',''),0.12);
        roundRect(axx-tw, yy-9, tw, 18, 5); ctx.fill();
        setFont(9,700); ctx.fillStyle=PAL.ink; ctx.textAlign='left';
        ctx.fillText('● '+ac.n, axx-tw+7, yy);
        setFont(8,400); ctx.fillStyle=PAL.muted; ctx.textAlign='right';
        ctx.fillText(ac.v, axx-7, yy);
      });
      ctx.globalAlpha=alpha;
      setFont(9,400); ctx.fillStyle=PAL.muted; ctx.textAlign='right'; ctx.textBaseline='alphabetic';
      ctx.fillText('isolated paper books', x1, y0+hgt*0.10);
    }
    ctx.restore();
  }

  function drawTitle(p){
    var a=easeOut(clamp(p*1.4,0,1))*(1-clamp((p-0.85)/0.15,0,1));
    ctx.save(); ctx.globalAlpha=a;
    ctx.textAlign='center';
    setFont(Math.max(20,Math.min(40,W*0.032)),700); ctx.fillStyle=PAL.ink; ctx.textBaseline='alphabetic';
    if(PAL.glow){ ctx.shadowColor=rgba(PAL.aud.replace('#',''),0.35); ctx.shadowBlur=16; }
    ctx.fillText('THE MACHINE, END TO END', W/2, H*0.42);
    ctx.shadowBlur=0;
    setFont(Math.max(11,Math.min(15,W*0.012)),400); ctx.fillStyle=PAL.ink_dim||PAL['ink-dim'];
    ctx.fillText('multi‑region momentum  ·  parallel FX engine  ·  combined in AUD', W/2, H*0.42+30);
    // three region dots
    ctx.globalAlpha=a;
    var cx=W/2 - 70;
    REGIONS.forEach(function(R,ri){
      ctx.beginPath(); ctx.arc(cx+ri*70, H*0.42+62, 5,0,Math.PI*2);
      ctx.fillStyle=PAL[R.col]; ctx.fill();
      setFont(10,600); ctx.fillStyle=PAL.muted; ctx.textAlign='center';
      ctx.fillText(R.key, cx+ri*70, H*0.42+82);
    });
    ctx.restore();
  }

  // ---------------------------------------------------------------
  // 6. Master render — pure function of `clock`
  // ---------------------------------------------------------------
  function render(){
    M = metrics();
    drawBackground();
    var bi = beatAt(clock);
    var p = clamp((clock-STARTS[bi])/BEATS[bi].dur, 0, 1);
    var key = BEATS[bi].key;

    if(key!=='title') drawStations(key);

    // band labels visible once universe begins
    var blAlpha = clamp((clock-STARTS[1]+0.2)/1.2,0,1) * (1-clamp((clock-STARTS[6]-1)/1.5,0,1)*0.35);
    if(key!=='title') drawBandLabels(blAlpha);

    // tokens: interpolate L(bi-1) -> L(bi)
    var fromJ = bi===0?0:bi-1, toJ=bi;
    var pe = easeIO(p);
    for(var i=0;i<tokens.length;i++){
      var t=tokens[i];
      var A=layoutFor(t,fromJ), B=layoutFor(t,toJ);
      var s={
        x:lerp(A.x,B.x,pe), y:lerp(A.y,B.y,pe),
        r:lerp(A.r,B.r,pe), a:lerp(A.a,B.a,pe),
        bar:lerp(A.bar||0,B.bar||0,pe),
        barType:(pe<0.5?A.barType:B.barType),
        dim:B.dim||A.dim
      };
      drawToken(s,t,key);
    }

    // overlays
    if(key==='title') drawTitle(p);
    if(key==='rank') overlayRank(p);
    if(key==='filter') overlayFilter(p);
    if(key==='size') overlaySize(p);
    if(key==='sleeves') overlaySleeves(p);
    if(key==='combine') overlayCombine(p);

    // FX track present from 'size' onward
    if(clock>=STARTS[4]-0.4) drawFXtrack(clock);
    else drawFXframe(0);

    updateChrome(bi);
  }

  // ---------------------------------------------------------------
  // 7. Chrome / transport sync
  // ---------------------------------------------------------------
  var capTitle=document.getElementById('capTitle'),
      capText=document.getElementById('capText'),
      tlFill=document.getElementById('tlFill'),
      tlHead=document.getElementById('tlHead'),
      clockEl=document.getElementById('clock'),
      playBtn=document.getElementById('play'),
      timelineEl=document.getElementById('timeline');
  var marks=[];

  function fmt(t){ var m=Math.floor(t/60), s=Math.floor(t%60);
    return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }

  function buildMarks(){
    var wrap=document.getElementById('tlMarks'); wrap.innerHTML='';
    marks=[];
    BEATS.forEach(function(b,i){
      var pc=STARTS[i]/T*100;
      var m=document.createElement('div'); m.className='tl-mark'; m.style.left=pc+'%';
      var lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=b.name; m.appendChild(lbl);
      var hit=document.createElement('button'); hit.className='tl-mark hit'; hit.setAttribute('aria-label','Jump to '+b.name);
      hit.style.left=pc+'%';
      hit.addEventListener('click',function(ev){ ev.stopPropagation(); seek(STARTS[i]+0.001); });
      wrap.appendChild(m); wrap.appendChild(hit);
      marks.push(m);
    });
  }

  function updateChrome(bi){
    capTitle.textContent=BEATS[bi].cap;
    capText.innerHTML=BEATS[bi].txt;
    var pct=clock/T*100;
    tlFill.style.width=pct+'%';
    tlHead.style.left=pct+'%';
    clockEl.textContent=fmt(clock)+' / '+fmt(T);
    timelineEl.setAttribute('aria-valuenow', Math.round(pct));
    timelineEl.setAttribute('aria-valuetext', BEATS[bi].name);
    for(var i=0;i<marks.length;i++){
      marks[i].classList.toggle('active', i===bi);
      marks[i].classList.toggle('done', STARTS[i]<=clock);
    }
    playBtn.innerHTML = playing ? '&#10073;&#10073;' : '&#9654;';
    playBtn.setAttribute('aria-label', playing?'Pause':'Play');
  }

  // ---------------------------------------------------------------
  // 8. Playback control
  // ---------------------------------------------------------------
  var rafOn=false;
  function seek(t){ clock=clamp(t,0,T-0.001); render(); }
  function setPlaying(v){
    playing=v;
    if(playing && !rafOn){ rafOn=true; lastTs=null; requestAnimationFrame(tick); }
    updateChrome(beatAt(clock));
  }
  function tick(ts){
    if(!playing){ rafOn=false; return; }
    if(lastTs==null) lastTs=ts;
    var dt=Math.min(0.05,(ts-lastTs)/1000); lastTs=ts;
    clock+=dt*speed;
    if(clock>=T){ clock=0; } // loop
    render();
    requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click',function(){ setPlaying(!playing); });
  document.getElementById('replay').addEventListener('click',function(){ seek(0); if(!reduced) setPlaying(true); });
  document.getElementById('back').addEventListener('click',function(){
    var bi=beatAt(clock);
    if(clock-STARTS[bi]<0.6 && bi>0) bi--; // step to previous if near a boundary
    seek(STARTS[bi]+0.001);
  });
  document.getElementById('fwd').addEventListener('click',function(){
    var bi=beatAt(clock); if(bi<BEATS.length-1) seek(STARTS[bi+1]+0.001); else seek(T-0.001);
  });
  var speedBtn=document.getElementById('speed');
  speedBtn.addEventListener('click',function(){
    speedIdx=(speedIdx+1)%SPEEDS.length; speed=SPEEDS[speedIdx];
    speedBtn.innerHTML=speed+'&times;';
  });

  // scrub on timeline
  var dragging=false;
  function posToTime(clientX){
    var r=timelineEl.getBoundingClientRect();
    return clamp((clientX-r.left)/r.width,0,1)*T;
  }
  timelineEl.addEventListener('pointerdown',function(e){
    dragging=true; timelineEl.setPointerCapture(e.pointerId);
    seek(posToTime(e.clientX));
  });
  timelineEl.addEventListener('pointermove',function(e){ if(dragging) seek(posToTime(e.clientX)); });
  timelineEl.addEventListener('pointerup',function(e){ dragging=false; });
  timelineEl.addEventListener('keydown',function(e){
    var bi=beatAt(clock);
    if(e.key==='ArrowRight'){ e.preventDefault(); if(bi<BEATS.length-1) seek(STARTS[bi+1]+0.001); }
    else if(e.key==='ArrowLeft'){ e.preventDefault();
      if(clock-STARTS[bi]<0.6 && bi>0) bi--; seek(STARTS[bi]+0.001); }
  });

  // global keyboard
  window.addEventListener('keydown',function(e){
    if(e.target.tagName==='BUTTON' && e.key===' ') return;
    if(e.key===' '){ e.preventDefault(); setPlaying(!playing); }
  });

  // ---------------------------------------------------------------
  // 9. Resize / theme
  // ---------------------------------------------------------------
  function resize(){
    var stage=cvs.parentNode.getBoundingClientRect();
    W=stage.width; H=stage.height;
    cvs.width=Math.round(W*DPR); cvs.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    render();
  }
  window.addEventListener('resize',resize);
  var mo=new MutationObserver(function(){ readPalette(); render(); });
  mo.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){ readPalette(); render(); });

  // ---------------------------------------------------------------
  // 10. Boot
  // ---------------------------------------------------------------
  // deep-link support: #beat=combine or #t=42 seeks and pauses on that frame
  function parseHash(){
    var h=(location.hash||'').replace('#','');
    if(!h) return null;
    var mB=h.match(/beat=([a-z]+)/i);
    if(mB){ for(var i=0;i<BEATS.length;i++){ if(BEATS[i].key===mB[1].toLowerCase()) return STARTS[i]+0.05; } }
    var mT=h.match(/t=([0-9.]+)/);
    if(mT){ return clamp(parseFloat(mT[1]),0,T-0.001); }
    return null;
  }
  // stamp the "real · as of <date>" chip from the embedded data (kept in sync
  // by scripts/build_walkthrough.py, which refreshes DATA at deploy time)
  (function(){
    var chip=document.getElementById('asofChip');
    var d=(typeof DATA==='object' && (DATA.asof || (DATA.fx && DATA.fx.asof))) || '';
    var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var mm=/^(\d{4})-(\d{2})-(\d{2})/.exec(d);
    var label = mm ? ('as of '+(+mm[3])+' '+MO[+mm[2]-1]+' '+mm[1]) : 'live';
    if(chip) chip.innerHTML='<b>real</b> '+label;
  })();
  buildMarks();
  resize();
  var hp=parseHash();
  if(hp!=null){
    seek(hp);                 // land paused on the requested stage
  } else if(reduced){
    seek(0); capTitle.textContent='Press play';
  } else {
    setPlaying(true);
  }
  window.addEventListener('hashchange',function(){ var t=parseHash(); if(t!=null){ setPlaying(false); seek(t); } });
})();
</script>
</body>
</html>
